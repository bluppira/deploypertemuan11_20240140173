<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .card {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
        }
        h1 { text-align: center; margin-bottom: 30px; color: #333; font-size: 28px; }
        .form-group { margin-bottom: 16px; }
        label { display: block; margin-bottom: 6px; color: #555; font-size: 14px; font-weight: 600; }
        input {
            width: 100%; padding: 10px 14px;
            border: 1px solid #ddd; border-radius: 8px;
            font-size: 14px; outline: none; transition: border 0.2s;
        }
        input:focus { border-color: #4f7ef7; }
        button {
            width: 100%; padding: 12px;
            background: #4f7ef7; color: white;
            border: none; border-radius: 8px;
            font-size: 15px; font-weight: 600;
            cursor: pointer; margin-top: 8px; transition: background 0.2s;
        }
        button:hover { background: #3a67e0; }
        .footer-link { text-align: center; margin-top: 20px; font-size: 14px; color: #666; }
        .footer-link a { color: #4f7ef7; text-decoration: none; font-weight: 600; }
        .footer-link a:hover { text-decoration: underline; }
        .error {
            background: #fee2e2; color: #dc2626;
            padding: 10px 14px; border-radius: 8px;
            font-size: 14px; margin-bottom: 16px; text-align: center;
        }
    </style>
</head>
<body>
<div class="card">
    <h1>Login</h1>
    <div class="error" th:if="${error}" th:text="${error}"></div>
    <form th:action="@{/login}" method="post">
        <div class="form-group">
            <label>Username</label>
            <input type="text" name="username" placeholder="Masukkan username"/>
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" placeholder="Masukkan password"/>
        </div>
        <button type="submit">Login</button>
    </form>
    <div class="footer-link">
        <p>Belum punya akun? <a th:href="@{/register}">Register disini</a></p>
    </div>
</div>
</body>
</html>
